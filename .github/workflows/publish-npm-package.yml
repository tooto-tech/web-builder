name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Package to publish
        required: true
        type: choice
        options:
          - '@toototech/webbuilder'
          - '@toototech/webbuilder-plugins'
      mode:
        description: Publish mode
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish
      dist_tag:
        description: npm dist-tag used for publish mode. Keep latest reserved for the 0.2 line.
        required: true
        default: legacy-0.1
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: ${{ inputs.mode }} ${{ inputs.package_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run package guard
        run: pnpm guard

      - name: Build selected package and dependencies
        run: pnpm --filter "${{ inputs.package_name }}..." build

      - name: Pack selected package
        run: pnpm --filter "${{ inputs.package_name }}" exec npm pack --dry-run

      - name: Publish selected package
        if: inputs.mode == 'publish'
        run: pnpm --filter "${{ inputs.package_name }}" exec npm publish --access public --tag "${{ inputs.dist_tag }}"
